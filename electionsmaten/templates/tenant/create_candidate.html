{% extends "shared/base.html" %}

{% block content %}

<h2>Create Candidate</h2>

<form method="POST">

<input name="name" placeholder="Candidate Name">

<select name="list_id">

{% for list in lists %}
<option value="{{ list.id }}">{{ list.name }}</option>
{% endfor %}

</select>

<button type="submit">Create</button>

</form>

{% endblock %}
