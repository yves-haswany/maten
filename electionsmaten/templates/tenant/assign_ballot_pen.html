{% extends "shared/base.html" %}

{% block content %}

<h2>Assign Ballot Pen</h2>

<form method="POST">

<select name="user_id">

{% for user in users %}
<option value="{{ user.id }}">{{ user.username }}</option>
{% endfor %}

</select>

<select name="pen_id">

{% for pen in pens %}
<option value="{{ pen.id }}">{{ pen.name }}</option>
{% endfor %}

</select>

<button type="submit">Assign</button>

</form>

{% endblock %}
