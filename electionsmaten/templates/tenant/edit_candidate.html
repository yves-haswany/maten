<!DOCTYPE html>
<html>
<head>
    <title>Edit Candidate</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="form-container">

<h2>Edit Candidate</h2>

<form method="POST">

    <!-- Candidate Name -->
    <label>Candidate Name</label>
    <input 
        type="text" 
        name="name" 
        value="{{ candidate.name }}" 
        required
    >

    <!-- Party Selection -->
    <label>Party</label>
    <select name="party_id" required>
        {% for party in candidate.candidate_list.parties %}
            <option value="{{ party.id }}"
                {% if party.id == candidate.party_id %}selected{% endif %}>
                {{ party.name }}
            </option>
        {% endfor %}
    </select>

    <br><br>

    <button type="submit">Update Candidate</button>

</form>

<br>

<a href="{{ url_for('tenant.manage_lists') }}">← Back to Manage Lists</a>

</div>

</body>
</html>
