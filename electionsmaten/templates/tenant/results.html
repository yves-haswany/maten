{% for district_id, rows in results.items() %}
    <h2>District {{ district_id }}</h2>

    <a href="{{ url_for('tenant.download_results', district_id=district_id) }}">
        Download CSV
    </a>

    <table border="1">
        <tr>
            <th>List</th>
            <th>Candidate</th>
            <th>Votes</th>
        </tr>

        {% for r in rows %}
        <tr>
            <td>{{ r.list_name }}</td>
            <td>{{ r.candidate_name }}</td>
            <td>{{ r.votes }}</td>
        </tr>
        {% endfor %}
    </table>

    <hr>
{% endfor %}
