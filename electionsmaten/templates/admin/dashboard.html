<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="bg-gray-100 min-h-screen p-6">

<header class="flex justify-between items-center mb-6">
    <h1 class="text-3xl font-bold">Admin Dashboard</h1>
    <a href="{{ url_for('admin.logout') }}" class="logout-button">Logout</a>
</header>

<div class="dashboard-grid">

    <!-- Create Tenant -->
    <a href="{{ url_for('admin.create_tenant') }}" class="dashboard-card">
        <h2>Create Tenant</h2>
        <p>Add a new tenant</p>
    </a>

    <!-- Create District -->
    <a href="{{ url_for('admin.create_district') }}" class="dashboard-card">
        <h2>Create District</h2>
        <p>Add a new district</p>
    </a>

    <!-- Manage Tenants -->
    <a href="{{ url_for('admin.view_tenants') }}" class="dashboard-card">
        <h2>Manage Tenants</h2>
        <p>Edit or delete existing tenants</p>
    </a>

    <!-- Manage Districts -->
    <a href="{{ url_for('admin.view_districts') }}" class="dashboard-card">
        <h2>Manage Districts</h2>
        <p>Edit or delete existing districts</p>
    </a>


</div>

</body>
</html>
