<!DOCTYPE html>
<html>
<head>
    <title>Create Party</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h2>Create Party (Tenant)</h2>

    <form method="POST" class="party-form">

        <label>Party Name</label>
        <input type="text" name="name" required>

        <label>Tenant Username</label>
        <input type="text" name="username" required>

        <label>Tenant Password</label>
        <input type="password" name="password" required>

        <button type="submit" class="btn-primary">Create Party</button>

        <a href="{{ url_for('admin.dashboard') }}" class="btn-secondary">
            Back to Dashboard
        </a>

    </form>

</div>

</body>
</html>
