<!DOCTYPE html>
<html>
<head>
    <title>Edit District</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="form-container">

<h2>Edit District</h2>

<form method="POST">
    <div class="mb-3">
        <label class="form-label">District Name</label>
        <input type="text" name="name" class="form-control" value="{{ district.name }}" required>
    </div>
    <button type="submit" class="btn btn-primary">Update District</button>
</form>

<br>
<a href="{{ url_for('admin.view_districts') }}" class="btn btn-secondary">Back to District list</a>

</body>
</html>
