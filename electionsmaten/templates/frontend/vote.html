{% extends "shared/base.html" %}

{% block content %}

<form id="vote-form">

<div class="container">

    <h2>Vote</h2>

    <!-- LISTS -->
    <div>
        <h3>Select a List</h3>
        <table>
            <tr>
                <th>List</th>
                <th>Select</th>
            </tr>

            {% for list in lists %}
            <tr>
                <td>{{ list.name }}</td>
                <td>
                    <input type="radio" name="list_id" class="list-radio" value="{{ list.id }}">
                </td>
            </tr>
            {% endfor %}
        </table>
    </div>

    <br>

    <!-- CANDIDATES -->
    <div>
        <h3>Candidates</h3>
        <table id="candidate-table">
            <tr>
                <td colspan="2">Select a list first</td>
            </tr>
        </table>
    </div>

    <br>

    <button type="submit">Submit Vote</button>

    <br><br>
    <a href="{{ url_for('frontend_bp.dashboard') }}">Back to Dashboard</a>

</div>

</form>

<script>
document.addEventListener("DOMContentLoaded", () => {

    const voteForm = document.getElementById("vote-form");
    const candidateTable = document.getElementById("candidate-table");

    // LOAD CANDIDATES
    document.querySelectorAll(".list-radio").forEach(radio => {
        radio.addEventListener("change", () => {

            fetch(`/get-candidates/${radio.value}`)
            .then(res => res.json())
            .then(data => {

                let html = `
                    <tr>
                        <th>Name</th>
                        <th>Select</th>
                    </tr>

                    <!-- ✅ No Candidate option -->
                    <tr>
                        <td><em>No candidate (list only)</em></td>
                        <td>
                            <input type="radio" name="candidate_id" value="">
                        </td>
                    </tr>
                `;

                if (!data.candidates.length) {
                    html += `<tr><td colspan="2">No candidates available</td></tr>`;
                } else {
                    data.candidates.forEach(c => {
                        html += `
                            <tr>
                                <td>${c.name}</td>
                                <td>
                                    <input type="radio" name="candidate_id" value="${c.candidate_id}">
                                </td>
                            </tr>
                        `;
                    });
                }

                candidateTable.innerHTML = html;
            })
            .catch(err => {
                console.error(err);
                candidateTable.innerHTML = "<tr><td colspan='2'>Error loading candidates</td></tr>";
            });
        });
    });

    // SUBMIT VOTE
    voteForm.addEventListener("submit", e => {
        e.preventDefault();

        const formData = new FormData(voteForm);

        const listSelected = formData.get("list_id");
        const candidateSelected = formData.get("candidate_id");

        if (!listSelected && candidateSelected) {
            alert("You must select a list before choosing a candidate.");
            return;
        }

        fetch("/submit-vote", {
            method: "POST",
            body: formData
        })
        .then(res => res.json())
        .then(data => {

            if (data.error) {
                alert(data.error);
                return;
            }

            alert("Vote submitted successfully!");

            voteForm.reset();

            candidateTable.innerHTML = `
                <tr>
                    <td colspan="2">Select a list first</td>
                </tr>
            `;
        })
        .catch(err => {
            console.error(err);
            alert("Error submitting vote");
        });
    });

});
</script>

{% endblock %}
