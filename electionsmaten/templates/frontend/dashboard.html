{% extends "shared/base.html" %}

{% block content %}

<div class="dashboard-container">

    <!-- HEADER -->
    <div class="dashboard-header">
        <div class="dashboard-title">Dashboard</div>

        <a href="{{ url_for('frontend_bp.logout') }}" class="logout-button">
            Logout
        </a>
    </div>

    <!-- GRID -->
    <div class="dashboard-grid">

        <!-- Enter Electors -->
        <a href="{{ url_for('frontend_bp.electors') }}" class="dashboard-card">
            <h2>Enter Electors</h2>
            <p>Add elector IDs before voting</p>
        </a>

        <!-- View Electors -->
        <a href="{{ url_for('frontend_bp.view_electors') }}" class="dashboard-card">
            <h2>View Electors</h2>
            <p>See submitted elector IDs</p>
        </a>

        <!-- Cast Vote -->
        <a href="{{ url_for('frontend_bp.cast_vote') }}" class="dashboard-card">
            <h2>Cast Vote</h2>
            <p>Submit votes securely</p>
        </a>

    </div>

</div>

{% endblock %}
