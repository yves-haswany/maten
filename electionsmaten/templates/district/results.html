{% if results %}
<table class="results-table">
    <thead>
        <tr>
            <th>#</th>
            <th>Ballot Pen</th>
            <th>List</th>
            <th>Candidate</th>
            <th>Votes</th>
        </tr>
    </thead>

    <tbody>
        {% for row in results %}
        <tr>
            <td>{{ loop.index }}</td>
            <td>{{ row.ballot_pen }}</td>
            <td>{{ row.list_name or "—" }}</td>
            <td>{{ row.candidate_name or "—" }}</td>
            <td>{{ row.votes }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% else %}
    <p>No votes recorded for this district.</p>
{% endif %}
