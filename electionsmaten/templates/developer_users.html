<!DOCTYPE html>
<html>
<head>
    <title>Developer User Panel</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        table, td, th {
            border: 1px solid black;
        }
        td, th {
            padding: 8px;
        }
    </style>
</head>
<body>

<h1>Developer – All Users & Electors</h1>

<a href="{{ url_for('main.export_all_electors') }}">
    <button style="padding:10px;margin-bottom:20px;">Export All Electors (TXT)</button>
</a>

<table>
    <tr>
        <th>Username</th>
        <th>Elector ID</th>
        <th>Submitted At</th>
    </tr>

    {% for user in users %}
        {% for e in user.electors %}
            <tr>
                <td>{{ user.username }}</td>
                <td>{{ e.elector_id }}</td>
                <td>{{ e.submitted_at }}</td>
            </tr>
        {% endfor %}
    {% endfor %}
</table>

</body>
</html>
